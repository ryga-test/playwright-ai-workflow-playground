adapter: pi

# Each pipeline run creates its own git branch (pipeline/<app>/<runId>)
# and switches to it. All pipeline artifacts are produced on that branch.

capabilities:
  - step: resolve
    command_template: |
      /pipeline-resolve {{app}} {{run}}
      
      Resolve inputs for the {{app}} application using the pre-generated run ID **{{run}}**:
      1. Load and validate apps/{{app}}/profile.yaml
      2. Check that {{baseUrlEnvVar}} is set in .env
      3. Use the exact run ID: **{{run}}**. Do not generate a new one.
      4. Write run metadata to results/{{app}}/{{run}}/step1-resolve/run-metadata.json

  - step: discover
    command_template: |
      /pipeline-discover {{app}} {{run}}
      
      Discover the UI of the {{app}} application:
      1. Navigate to the app's base URL (from {{baseUrlEnvVar}})
      2. Capture a full Playwright ARIA snapshot
      3. Write snapshot to results/{{app}}/{{run}}/step2-discover/snapshot.yaml
      4. Identify all interactive elements and list as selector candidates
      5. Write selector candidates to results/{{app}}/{{run}}/step2-discover/selector-candidates.md
      
      Locator priority: getByRole > getByTestId > getByLabel > getByPlaceholder > getByText > CSS/XPath

  - step: extract-selectors
    command_template: |
      /pipeline-extract-selectors {{app}} {{run}}
      
      Extract and normalize selectors:
      1. Read results/{{app}}/{{run}}/step2-discover/snapshot.yaml
      2. Read results/{{app}}/{{run}}/step2-discover/selector-candidates.md
      3. Normalize selectors using Playwright locator priority
      4. Annotate each selector with its priority level and rationale
      5. Write normalized selectors to results/{{app}}/{{run}}/step3-extract-selectors/normalized-selectors.md

  - step: draft-page-object
    gated: true
    command_template: |
      /pipeline-draft-page-object {{app}} {{run}}
      
      Draft a TypeScript page object:
      1. Read results/{{app}}/{{run}}/step3-extract-selectors/normalized-selectors.md
      2. Generate a TypeScript page object class using @playwright/test Page
      3. Use the normalized selectors with proper locator methods
      4. Write draft to results/{{app}}/{{run}}/step4-draft-page-object/page-object.draft.ts
      5. Present the draft for human review — do NOT promote to src/pages/{{app}}/ until approved

  - step: draft-tests
    gated: true
    command_template: |
      /pipeline-draft-tests {{app}} {{run}}
      
      Draft GWT-style test scenarios:
      1. Read results/{{app}}/{{run}}/step4-draft-page-object/page-object.draft.ts
      2. Read knowledge/{{app}}/knowledge.md for app context
      3. Generate Given-When-Then test scenarios covering all interactive elements
      4. Write draft to results/{{app}}/{{run}}/step5-draft-tests/test-draft.md
      5. Present the draft for human review — do NOT proceed to spec writing until approved

  - step: write-spec
    command_template: |
      /pipeline-write-spec {{app}} {{run}}
      
      Write the Playwright spec:
      1. Read approved test draft from results/{{app}}/{{run}}/step5-draft-tests/test-draft.md
      2. Read approved page object from src/pages/{{app}}/{{app}}.page.ts
      3. Generate a complete Playwright spec using @playwright/test
         IMPORTANT: Import test and expect from @fixtures/base.fixture.js
         (not from @playwright/test) to enable screencast video recording.
         Example import: import { test, expect } from '@fixtures/base.fixture.js';
      4. If tests/{{app}}/{{app}}.spec.ts already exists, write the proposed diff to results/{{app}}/{{run}}/step6-write-spec/spec.diff
      5. Overwrite tests/{{app}}/{{app}}.spec.ts automatically; do not request another human approval in Step 6
      6. Add/update provenance header: // @provenance runId={{run}} approvedAt=<now> gate=test-draft-review
      7. Run npm run typecheck to verify compilation

  - step: run-fix
    command_template: |
      /pipeline-run-fix {{app}} {{run}}
      
      Run tests and fix script bugs (with screencast video proof):
      1. Set env var PLAYWRIGHT_RUN_ID={{run}} to enable screencast recording
      2. Run: PLAYWRIGHT_RUN_ID={{run}} npx playwright test tests/{{app}}/ --reporter=html
      3. The base fixture auto-records per-test screencast video with action
         annotations (red dots + labels on clicks/fills) into:
         results/{{app}}/{{run}}/step7-run-fix/<test-name>.webm
      4. For each failure, classify as:
         - script_bug: fix the spec code
         - app_bug: report only, do not modify
         - blocker: report and mark step blocked
      5. Fix script bugs and re-run (max 3 fix cycles)
      6. Write test report to results/{{app}}/{{run}}/step7-run-fix/test-report.md
      7. Concatenate per-test screencast videos into a single
         results/{{app}}/{{run}}/step7-run-fix/screencast.webm using ffmpeg
      8. Ensure HTML report, traces, screenshots, and screencast video are in
         results/{{app}}/{{run}}/step7-run-fix/

  - step: summarize
    command_template: |
      /pipeline-summarize {{app}} {{run}}
      
      Summarize results and update knowledge:
      1. Read results/{{app}}/{{run}}/step7-run-fix/test-report.md
      2. Write pipeline summary to results/{{app}}/{{run}}/pipeline-summary.md
      3. Extract verified observations (selectors that produced passing tests)
      4. Append verified observations to knowledge/{{app}}/knowledge.md under ## Run {{run}}
      5. Append actionable rules to knowledge/{{app}}/rules.md under ## Run {{run}}
      6. Do NOT modify content under ## Human-Curated
      7. Do NOT duplicate observations already present in the file
      8. Apply knowledge/PRUNING_POLICY.md: if an entry has been contradicted
         or superseded by the last six successful runs, move it from active
         knowledge files to knowledge/{{app}}/archive.md and record the action
         in knowledge/{{app}}/prune-log.md. Absence from recent runs alone is
         not enough to prune.
      9. Regenerate knowledge/{{app}}/current.md as the compact active summary
